spring:
  application:
    name: experimentation

  datasource:
      driver-class-name: org.postgresql.Driver
      url: jdbc:postgresql://localhost:5433/experimentation
      username: postgres
      password: password
  jpa:
      hibernate:
         ddl-auto: update
      show-sql: true
      properties:
            hibernate:
              dialect: org.hibernate.dialect.PostgreSQLDialect